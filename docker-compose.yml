services:
  embeddings-1:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    command: --model-id intfloat/multilingual-e5-small --max-concurrent-requests 2 --max-batch-tokens 1024
    ports:
      - "7861:80"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1200M

  embeddings-2:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    command: --model-id intfloat/multilingual-e5-small --max-concurrent-requests 2 --max-batch-tokens 1024
    ports:
      - "7862:80"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1200M

  embeddings-3:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    command: --model-id intfloat/multilingual-e5-small --max-concurrent-requests 2 --max-batch-tokens 1024
    ports:
      - "7863:80"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1200M

  tei-lb:
    image: nginx:alpine
    ports:
      - "7860:80"
    volumes:
      - ./nginx/tei.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - embeddings-1
      - embeddings-2
      - embeddings-3
    restart: unless-stopped
